<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calendario Personalizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = {
            config: {
                darkMode: 'class',
                theme: {
                    extend: {
                        colors: {
                            primary: '#4f46e5',
                            primaryHover: '#4338ca'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-title { font-family: 'Montserrat', sans-serif; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bg-custom-image {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        #app-container {
            background-color: rgba(255, 255, 255, 0.95);
            transition: background-color 0.3s ease;
        }
        .dark #app-container {
            background-color: rgba(31, 41, 55, 0.95);
        }

        .event-label {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors">
    <!-- Fondo Dinámico -->
    <div id="bg-layer" class="bg-custom-image hidden"></div>

    <div id="app-container" class="flex h-full w-full relative z-10 backdrop-blur-sm overflow-hidden">
        
        <!-- Overlay oscuro para móvil -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

        <!-- Barra Lateral Estrecha -->
        <aside id="sidebar" class="w-52 border-r border-gray-200 dark:border-gray-700 bg-white/95 dark:bg-gray-800/95 flex-col backdrop-blur-md fixed md:relative z-40 h-full shadow-2xl md:shadow-none transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex">
            <div class="p-4 flex flex-col gap-4 h-full">
                <!-- Botón de Contactos -->
                <button onclick="openModal('contacts-modal')" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-2.5 rounded-xl font-semibold shadow-md hover:shadow-lg hover:from-blue-600 hover:to-indigo-700 transition-all text-sm flex items-center justify-center gap-2">
                    <span class="text-lg">👥</span> Contactos
                </button>
                
                <!-- Mini-Calendario -->
                <div class="flex-1 mt-2 mb-2 flex flex-col min-h-0 bg-white dark:bg-gray-800 rounded-lg p-2 shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-2">
                        <button onclick="changeMiniMonth(-1)" class="text-gray-500 hover:text-primary px-2 font-bold">&lt;</button>
                        <span id="mini-month-display" class="text-[11px] font-bold capitalize text-gray-700 dark:text-gray-300"></span>
                        <button onclick="changeMiniMonth(1)" class="text-gray-500 hover:text-primary px-2 font-bold">&gt;</button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-[9px] text-center font-bold text-gray-400 mb-1">
                        <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
                    </div>
                    <div id="mini-calendar-grid" class="grid grid-cols-7 gap-1 flex-1 content-start">
                        <!-- Inyectado por JS -->
                    </div>
                </div>

                <!-- Botón de Ajustes -->
                <button onclick="openModal('settings-modal')" class="w-full bg-gradient-to-r from-slate-600 to-gray-700 text-white py-2.5 rounded-xl font-semibold shadow-md hover:shadow-lg hover:from-slate-700 hover:to-gray-800 transition-all mt-auto text-sm flex items-center justify-center gap-2">
                    <span class="text-lg">⚙️</span> Ajustes
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative h-full">
            <header class="h-16 shadow-sm border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 z-10 bg-white/50 dark:bg-gray-800/50 backdrop-blur-md">
                <div class="flex items-center gap-1 md:gap-3">
                    <!-- Hamburger Menu Mobile -->
                    <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <!-- Botón de Vista a la Izquierda -->
                    <button id="view-toggle-btn" onclick="toggleView()" class="px-2 md:px-3 py-1.5 text-[10px] md:text-xs bg-primary hover:bg-primaryHover text-white rounded-lg font-semibold shadow-md transition-all active:scale-95 w-20 md:w-24 text-center">
                        Vista: Semana
                    </button>
                    
                    <div class="h-6 w-px bg-gray-300 dark:bg-gray-600 mx-1"></div>
                    
                    <button onclick="changeDate(-1)" class="p-1 md:p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full transition-colors text-gray-600 dark:text-gray-300">&lt;</button>
                    <h2 id="current-date-display" class="text-sm md:text-lg font-bold text-gray-800 dark:text-gray-100 capitalize min-w-[130px] md:min-w-[180px] text-center"></h2>
                    <button onclick="changeDate(1)" class="p-1 md:p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full transition-colors text-gray-600 dark:text-gray-300">&gt;</button>
                    <button onclick="goToday()" class="ml-1 md:ml-2 px-2 md:px-3 py-1 text-[10px] md:text-xs bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded-md transition-colors font-medium">Hoy</button>
                </div>
                <div class="flex-1 flex justify-center pr-2 md:pr-10 hidden lg:flex">
                    <span class="text-2xl font-title font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-blue-600 dark:from-indigo-400 dark:to-blue-400 tracking-widest drop-shadow-sm uppercase">CALENDARIO MASOT</span>
                </div>
            </header>

            <!-- Contenedor del Calendario -->
            <div id="calendar-container" class="flex-1 p-2 overflow-hidden flex flex-col bg-transparent">
                <!-- Se inyecta la vista aquí -->
            </div>
        </main>
    </div>

    <!-- MODALES -->
    
    <!-- Modal de Ajustes -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4">⚙️ Ajustes del Calendario</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label class="font-medium text-sm">Modo Oscuro</label>
                    <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()" class="w-4 h-4 cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Imagen de Fondo (Subir)</label>
                    <input type="file" id="bg-image-upload" accept="image/*" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent">
                    <button onclick="clearBackground()" class="mt-1 text-[10px] text-red-500 hover:underline">Quitar fondo actual</button>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Opacidad del panel (0 a 100)</label>
                    <input type="range" id="bg-opacity" min="0" max="100" value="95" class="w-full cursor-pointer" oninput="updateOpacity()">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Hora Inicio</label>
                        <select id="time-start" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Hora Fin</label>
                        <select id="time-end" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent"></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Descanso (Inicio)</label>
                        <select id="break-start" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Descanso (Fin)</label>
                        <select id="break-end" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Intervalo (Minutos)</label>
                    <select id="time-interval" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent">
                        <option value="15">15 Minutos</option>
                        <option value="30">30 Minutos</option>
                        <option value="60">1 Hora</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Mensaje WhatsApp predeterminado</label>
                    <p class="text-[10px] text-gray-500 mb-1">Usa {fecha} y {hora} para variables dinámicas.</p>
                    <textarea id="wa-message" rows="2" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent">Hola, te recuerdo tu cita el día {fecha} a las {hora}.</textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeModal('settings-modal')" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg text-sm">Cancelar</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Modal Evento -->
    <div id="event-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold mb-4" id="event-modal-title">Nuevo Evento</h3>
            <div class="space-y-3 relative">
                <div class="relative">
                    <label class="block text-sm font-medium mb-1">Nombre</label>
                    <input type="text" id="ev-name" autocomplete="off" onkeyup="filterContacts(this.value)" onfocus="filterContacts(this.value)" class="w-full border-2 border-gray-300 dark:border-gray-500 rounded px-3 py-2 text-sm bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                    <div id="autocomplete-list" class="absolute z-50 w-full bg-white dark:bg-gray-700 border dark:border-gray-600 rounded-b shadow-lg hidden max-h-32 overflow-y-auto mt-1 text-sm"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Teléfono</label>
                    <input type="tel" id="ev-phone" class="w-full border-2 border-gray-300 dark:border-gray-500 rounded px-3 py-2 text-sm bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Observaciones</label>
                    <textarea id="ev-obs" rows="2" class="w-full border-2 border-gray-300 dark:border-gray-500 rounded px-3 py-2 text-sm bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"></textarea>
                </div>
                <!-- Campos ocultos para mantener info -->
                <input type="hidden" id="ev-id">
                <input type="hidden" id="ev-date">
                <input type="hidden" id="ev-time">
                <input type="hidden" id="ev-endtime">
            </div>
            <div class="mt-5 flex justify-end gap-2">
                <button onclick="closeModal('event-modal')" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-700 rounded text-sm">Cancelar</button>
                <button onclick="saveEvent()" class="px-3 py-1.5 bg-primary text-white rounded text-sm">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Acción Evento (Tarjeta rápida) -->
    <div id="event-action-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-xs p-5 text-center">
            <h3 class="text-xl font-bold mb-1" id="action-ev-name">Nombre</h3>
            <p class="text-xs text-gray-500 mb-4" id="action-ev-time">Hora</p>
            
            <div class="flex flex-col gap-2">
                <button onclick="editEventFromAction()" class="w-full py-2 bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 rounded font-medium hover:bg-blue-200 transition-colors">✏️ Editar</button>
                <button onclick="sendWAFromAction()" class="w-full py-2 bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300 rounded font-medium hover:bg-green-200 transition-colors">💬 Enviar WhatsApp</button>
                <button onclick="deleteEventFromAction()" class="w-full py-2 bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300 rounded font-medium hover:bg-red-200 transition-colors">🗑️ Eliminar</button>
            </div>
            <button onclick="closeModal('event-action-modal')" class="mt-4 text-xs text-gray-400 hover:text-gray-600 underline">Cerrar</button>
        </div>
    </div>

    <!-- Modal Acción Día -->
    <div id="day-action-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-xs p-5 text-center">
            <h3 class="text-lg font-bold mb-4" id="day-action-title">Opciones del Día</h3>
            <div class="flex flex-col gap-2">
                <button onclick="sendBulkWA()" class="w-full py-2 bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300 rounded font-medium hover:bg-green-200 transition-colors">💬 Enviar recordatorios</button>
                <button onclick="openCustomRangeModal()" class="w-full py-2 bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 rounded font-medium hover:bg-indigo-200 transition-colors">⏳ Personalizar</button>
                <button onclick="toggleHoliday()" class="w-full py-2 bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300 rounded font-medium hover:bg-red-200 transition-colors">🏖️ Día Festivo</button>
            </div>
            <button onclick="closeModal('day-action-modal')" class="mt-4 text-xs text-gray-400 hover:text-gray-600 underline">Cancelar</button>
        </div>
    </div>

    <!-- Modal Rango Personalizado -->
    <div id="custom-range-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm p-6 relative">
            <h3 class="text-lg font-bold mb-4">Personalizar / Bloquear Horario</h3>
            <div class="space-y-3 relative">
                <div>
                    <label class="block text-sm font-medium mb-1">Título</label>
                    <input type="text" id="cr-name" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent" placeholder="Reunión, Cirugía, Ausencia...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Desde</label>
                        <select id="cr-start" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Hasta</label>
                        <select id="cr-end" class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent"></select>
                    </div>
                </div>
            </div>
            <div class="mt-5 flex justify-end gap-2">
                <button onclick="closeModal('custom-range-modal')" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-700 rounded text-sm">Cancelar</button>
                <button onclick="saveCustomRange()" class="px-3 py-1.5 bg-primary text-white rounded text-sm">Generar</button>
            </div>
        </div>
    </div>

    <!-- Modal Contactos -->
    <div id="contacts-modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6 max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Mis Contactos</h3>
                <button onclick="closeModal('contacts-modal')" class="text-gray-500 hover:text-red-500 text-xl font-bold">&times;</button>
            </div>
            <!-- Nuevo buscador añadido aquí -->
            <div class="mb-3">
                <input type="text" id="contact-search-input" onkeyup="updateContactsList()" placeholder="Buscar por nombre o teléfono..." class="w-full border dark:border-gray-600 rounded px-3 py-2 text-sm bg-transparent focus:ring focus:ring-indigo-200 dark:focus:ring-indigo-800 outline-none">
            </div>
            <div class="flex-1 overflow-y-auto pr-2" id="contacts-list">
                <!-- Inyectado por JS -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 px-4 py-2 rounded shadow-lg text-white font-medium transition-opacity duration-300 opacity-0 pointer-events-none z-[100]">
        Mensaje
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXoUasAjktafYh3-YYcMup9Lk_obuxcL4",
            authDomain: "calendariomast.firebaseapp.com",
            projectId: "calendariomast",
            storageBucket: "calendariomast.firebasestorage.app",
            messagingSenderId: "741089042598",
            appId: "1:741089042598:web:8b8e01fc830eccc4c4d467"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let events = [];
        let contacts = [];
        let holidays = [];
        
        let settings = {
            darkMode: false,
            bgUrl: '',
            opacity: 95,
            start: '09:00',
            end: '20:00',
            breakStart: '',
            breakEnd: '',
            interval: 30,
            waMessage: 'Hola, te recuerdo tu cita el día {fecha} a las {hora}.'
        };

        const views = ['day', 'week', 'month'];
        let currentViewIndex = 1; // 1 = week
        if (window.innerWidth < 768) {
            currentViewIndex = 0; // Default to 'day' on mobile
        }
        let currentDate = new Date();
        let miniCalendarDate = new Date();
        
        let slots = [];
        let editingEventId = null;
        let actionEventId = null;
        let selectedDateForAction = null;

        window.onload = async () => {
            try {
                const docRef = doc(db, 'app_data', 'main');
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.events) events = data.events;
                    if (data.contacts) contacts = data.contacts;
                    if (data.holidays) holidays = data.holidays;
                    if (data.settings) settings = data.settings;
                }
            } catch (error) {
                console.error("Error cargando de Firebase:", error);
            }
            populateTimeSelects();
            applySettings();
            generateSlots();
            
            // Sincronizar el texto del botón con la vista inicial
            const btn = document.getElementById('view-toggle-btn');
            const v = views[currentViewIndex];
            if(btn) btn.innerText = `Vista: ${v === 'day' ? 'Día' : v === 'week' ? 'Semana' : 'Mes'}`;
            
            renderCalendar();
            renderMiniCalendar();
            updateContactsList();
        };

        function populateTimeSelects() {
            const selects = ['time-start', 'time-end', 'break-start', 'break-end'];
            let options = '<option value="">Ninguno</option>';
            for(let h=0; h<24; h++) {
                for(let m=0; m<60; m+=30) {
                    const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    options += `<option value="${time}">${time}</option>`;
                }
            }
            selects.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerHTML = id.includes('break') ? options : options.replace('<option value="">Ninguno</option>', '');
            });
        }

        async function saveState() {
            try {
                const docRef = doc(db, 'app_data', 'main');
                await setDoc(docRef, { events, contacts, holidays, settings }, { merge: true });
            } catch(e) { console.error("Error guardando state", e); }
        }

        // --- STREAMING_CHUNK:Utilities ---
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-5 right-5 px-4 py-2 rounded shadow-lg text-white font-medium transition-opacity duration-300 z-[100] ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        }

        function isPastEvent(dateStr, timeStr) {
            const [y, m, d] = dateStr.split('-');
            const [h, min] = timeStr.split(':');
            const evDate = new Date(y, m - 1, d, h, min);
            return evDate < new Date();
        }

        // --- STREAMING_CHUNK:Calendar Logic ---
        function generateSlots() {
            slots = [];
            let [hS, mS] = settings.start.split(':').map(Number);
            let [hE, mE] = settings.end.split(':').map(Number);
            
            let breakS = null, breakE = null;
            if (settings.breakStart && settings.breakEnd) {
                breakS = parseInt(settings.breakStart.split(':')[0]) * 60 + parseInt(settings.breakStart.split(':')[1]);
                breakE = parseInt(settings.breakEnd.split(':')[0]) * 60 + parseInt(settings.breakEnd.split(':')[1]);
            }

            let current = hS * 60 + mS;
            let end = hE * 60 + mE;
            let step = parseInt(settings.interval);

            while (current < end) {
                if (breakS !== null && breakE !== null && current >= breakS && current < breakE) {
                    current += step;
                    continue;
                }
                let h = Math.floor(current / 60);
                let m = current % 60;
                slots.push(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`);
                current += step;
            }
        }

        function toggleView() {
            currentViewIndex = (currentViewIndex + 1) % 3;
            const viewNames = ['Día', 'Semana', 'Mes'];
            document.getElementById('view-toggle-btn').innerText = `Vista: ${viewNames[currentViewIndex]}`;
            renderCalendar();
        }

        function changeDate(dir) {
            const view = views[currentViewIndex];
            if (view === 'day') currentDate.setDate(currentDate.getDate() + dir);
            else if (view === 'week') currentDate.setDate(currentDate.getDate() + (dir * 7));
            else if (view === 'month') currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
            miniCalendarDate = new Date(currentDate);
            renderMiniCalendar();
        }

        function goToday() {
            currentDate = new Date();
            renderCalendar();
            miniCalendarDate = new Date(currentDate);
            renderMiniCalendar();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- STREAMING_CHUNK:Rendering Main Views ---
        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            const dateDisplay = document.getElementById('current-date-display');
            const view = views[currentViewIndex];

            const formatter = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric', day: view === 'day' ? 'numeric' : undefined });
            let displayStr = formatter.format(currentDate);
            if(view === 'week') {
                const start = new Date(currentDate);
                const day = start.getDay();
                start.setDate(start.getDate() - day + (day === 0 ? -6 : 1));
                const end = new Date(start);
                end.setDate(end.getDate() + 6);
                displayStr = `${start.getDate()} ${start.toLocaleString('es-ES',{month:'short'})} - ${end.getDate()} ${end.toLocaleString('es-ES',{month:'short'})}`;
            }
            dateDisplay.innerText = displayStr;

            if (view === 'day') renderDayView(container);
            else if (view === 'week') renderWeekView(container);
            else renderMonthView(container);
        }

        function renderDayView(container) {
            const dateStr = currentDate.toISOString().split('T')[0];
            const isToday = dateStr === new Date().toISOString().split('T')[0];
            const isHoliday = holidays.includes(dateStr);
            const wNum = getWeekNumber(currentDate);
            const dayEvents = events.filter(e => e.dateStr === dateStr);
            
            let html = `
                <div class="flex flex-col h-full bg-white dark:bg-gray-800 rounded-lg shadow border dark:border-gray-700">
                    <div class="flex border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50">
                        <div class="w-12 border-r dark:border-gray-700 flex items-center justify-center text-xs font-bold text-gray-700 dark:text-gray-300">S${wNum}</div>
                        <div class="flex-1 p-1 text-center cursor-pointer transition-all ${isToday && !isHoliday ? 'bg-indigo-600 text-white shadow-inner' : 'hover:bg-gray-100 dark:hover:bg-gray-700'} ${isHoliday ? 'bg-red-500 text-white dark:bg-red-700' : ''}" onclick="openDayActionModal('${dateStr}')">
                            <span class="font-bold block capitalize text-lg ${isToday && !isHoliday ? 'text-white' : ''}">${currentDate.toLocaleDateString('es-ES', {weekday:'long'})}</span>
                            <span class="text-sm font-bold ${isToday && !isHoliday ? 'text-indigo-100' : (isHoliday ? 'text-red-100' : 'text-gray-500')}">${currentDate.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'})}</span>
                        </div>
                    </div>
                    <div class="flex-1 flex overflow-hidden">
                        <div class="w-12 border-r dark:border-gray-700 flex flex-col">
                            ${slots.map(time => `<div class="flex-1 border-b dark:border-gray-700 text-xs font-bold text-gray-700 dark:text-gray-300 flex items-center justify-center min-h-[1.5rem]">${time}</div>`).join('')}
                        </div>
                        <div class="flex-1 flex flex-col relative ${isHoliday ? 'bg-red-100 dark:bg-red-900/30' : ''}">
                            ${slots.map(time => `<div class="flex-1 border-b dark:border-gray-700 border-dashed min-h-[1.5rem] ${!isHoliday ? 'hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer' : ''}" ${!isHoliday ? `onclick="handleSlotClick(event, '${dateStr}', '${time}')"` : ''}></div>`).join('')}
                            ${generateEventsHTML(dayEvents)}
                        </div>
                    </div>
                </div>`;
            container.innerHTML = html;
        }

        function renderWeekView(container) {
            const startOfWeek = new Date(currentDate);
            const day = startOfWeek.getDay();
            startOfWeek.setDate(startOfWeek.getDate() - day + (day === 0 ? -6 : 1)); 

            const wNum = getWeekNumber(startOfWeek);
            
            let html = `<div class="flex flex-col h-full bg-white dark:bg-gray-800 rounded-lg shadow border dark:border-gray-700">
                <div class="flex border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50">
                    <div class="w-10 md:w-12 border-r dark:border-gray-700 flex items-center justify-center text-xs font-bold text-gray-700 dark:text-gray-300">S${wNum}</div>`;
            
            const weekDates = [];
            for(let i=0; i<7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                weekDates.push(d);
                const dStr = d.toISOString().split('T')[0];
                const isToday = dStr === new Date().toISOString().split('T')[0];
                const isHoliday = holidays.includes(dStr);
                html += `
                    <div class="flex-1 p-2 text-center border-r dark:border-gray-700 last:border-0 cursor-pointer transition-all ${isToday && !isHoliday ? 'bg-indigo-600 text-white shadow-md transform scale-[1.02] z-10 border-b-4 border-indigo-800' : 'hover:bg-gray-100 dark:hover:bg-gray-700'} ${isHoliday ? 'bg-red-500 text-white dark:bg-red-700' : ''}" onclick="openDayActionModal('${dStr}')">
                        <span class="block text-sm font-bold uppercase ${isToday && !isHoliday ? 'text-indigo-100' : 'opacity-80'}">${d.toLocaleDateString('es-ES', {weekday:'short'})}</span>
                        <span class="text-base font-extrabold ${isToday && !isHoliday ? 'text-white text-lg' : ''}">${d.getDate()}</span>
                    </div>`;
            }
            html += `</div><div class="flex-1 flex overflow-hidden">
                <div class="w-10 md:w-12 border-r dark:border-gray-700 flex flex-col">`;
            slots.forEach(time => {
                html += `<div class="flex-1 border-b dark:border-gray-700 text-xs font-bold text-gray-700 dark:text-gray-300 flex items-center justify-center min-h-[1.5rem] py-0">${time}</div>`;
            });
            html += `</div>`;
            
            weekDates.forEach(d => {
                const dStr = d.toISOString().split('T')[0];
                const isHoliday = holidays.includes(dStr);
                const dayEvents = events.filter(e => e.dateStr === dStr);

                html += `<div class="flex-1 flex flex-col border-r dark:border-gray-700 last:border-0 relative ${isHoliday ? 'bg-red-100 dark:bg-red-900/30' : ''}">`;
                slots.forEach(time => {
                    html += `<div class="flex-1 border-b dark:border-gray-700 border-dashed min-h-[1.5rem] ${!isHoliday ? 'hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer' : ''}" ${!isHoliday ? `onclick="handleSlotClick(event, '${dStr}', '${time}')"` : ''}></div>`;
                });
                html += generateEventsHTML(dayEvents);
                html += `</div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        // --- STREAMING_CHUNK:Events Render Engine ---
        function generateEventsHTML(dayEvents) {
            if (!dayEvents || dayEvents.length === 0) return '';
            const totalSlots = slots.length;
            if (totalSlots === 0) return '';

            let html = '';
            dayEvents.forEach(ev => {
                const sIdx = slots.indexOf(ev.timeStr);
                if (sIdx === -1) return;
                
                let span = 1;
                if (ev.endTimeStr) {
                    const eIdx = slots.indexOf(ev.endTimeStr);
                    if (eIdx > sIdx) span = eIdx - sIdx;
                }
                
                const topPercent = (sIdx / totalSlots) * 100;
                const heightPercent = (span / totalSlots) * 100;
                
                const past = isPastEvent(ev.dateStr, ev.timeStr);
                const bg = past ? 'bg-orange-500 hover:bg-orange-600' : 'bg-primary hover:bg-primaryHover';

                html += `
                    <div class="absolute inset-x-[1px] rounded text-white px-1 shadow-sm transition-colors cursor-pointer event-card ${bg} flex flex-col justify-center overflow-hidden" 
                         style="top: calc(${topPercent}% + 1px); height: calc(${heightPercent}% - 2px); z-index: 10;" 
                         onclick="openEventCard(event, '${ev.id}')">
                        <span class="font-medium text-[9px] md:text-[10px] leading-tight truncate block">${ev.name}</span>
                    </div>
                `;
            });
            return html;
        }

        // --- STREAMING_CHUNK:Additional Views & Modals ---
        function renderMonthView(container) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            let startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            let iterDate = new Date(firstDay);
            iterDate.setDate(iterDate.getDate() - startDay);
            
            let html = `
                <div class="flex-1 flex flex-col bg-white dark:bg-gray-800 rounded-lg shadow border dark:border-gray-700">
                    <div class="grid grid-cols-7 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-center text-xs font-bold py-2 text-gray-500">
                        <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
                    </div>
                    <div class="flex-1 grid grid-cols-7 grid-rows-6">
            `;
            
            for (let i = 0; i < 42; i++) {
                const isCurrentMonth = iterDate.getMonth() === month;
                const dStr = iterDate.toISOString().split('T')[0];
                const dayEvs = events.filter(e => e.dateStr === dStr);
                const isHoliday = holidays.includes(dStr);
                
                let classes = "border-r border-b dark:border-gray-700 p-1 flex flex-col hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer overflow-hidden transition-colors relative ";
                if (!isCurrentMonth) classes += "bg-gray-50/50 dark:bg-gray-800/50 text-gray-400 ";
                if (isHoliday) classes += "bg-red-50 dark:bg-red-900/20 ";

                html += `<div class="${classes}" onclick="handleMonthDayClick('${dStr}')">
                    <span class="text-xs font-medium ${isCurrentMonth ? '' : 'opacity-50'} ${iterDate.toDateString() === new Date().toDateString() ? 'bg-primary text-white w-5 h-5 flex items-center justify-center rounded-full' : ''}">${iterDate.getDate()}</span>
                    <div class="flex-1 mt-1 flex flex-col gap-0.5 overflow-hidden">
                `;
                
                dayEvs.slice(0, 3).forEach(ev => {
                    const past = isPastEvent(ev.dateStr, ev.timeStr);
                    const bg = past ? 'bg-orange-500' : 'bg-primary';
                    html += `<div class="${bg} text-white text-[9px] rounded px-1 truncate">${ev.timeStr} ${ev.name}</div>`;
                });
                if (dayEvs.length > 3) html += `<div class="text-gray-500 text-[9px] font-bold">+${dayEvs.length - 3}</div>`;
                html += `</div></div>`;
                iterDate.setDate(iterDate.getDate() + 1);
            }
            html += `</div></div></div>`;
            container.innerHTML = html;
        }

        function renderMiniCalendar() {
            const container = document.getElementById('mini-calendar-grid');
            const display = document.getElementById('mini-month-display');
            if (!container) return;

            const formatter = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' });
            display.innerText = formatter.format(miniCalendarDate);

            const year = miniCalendarDate.getFullYear();
            const month = miniCalendarDate.getMonth();
            const firstDay = new Date(year, month, 1);
            let startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1; 
            
            let iterDate = new Date(firstDay);
            iterDate.setDate(iterDate.getDate() - startDay);
            
            let html = '';
            for(let i=0; i<42; i++) {
                const isCurrentMonth = iterDate.getMonth() === month;
                const isToday = iterDate.toDateString() === new Date().toDateString();
                const isSelected = iterDate.toDateString() === currentDate.toDateString();
                
                let classes = "text-center py-1 text-[10px] rounded cursor-pointer transition-colors ";
                if (!isCurrentMonth) classes += "text-gray-300 dark:text-gray-600 ";
                else if (isSelected) classes += "bg-primary text-white font-bold ";
                else if (isToday) classes += "bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200 font-bold ";
                else classes += "hover:bg-gray-200 dark:hover:bg-gray-700 dark:text-gray-300 ";

                html += `<div class="${classes}" onclick="goToWeekFromMini(${iterDate.getFullYear()}, ${iterDate.getMonth()}, ${iterDate.getDate()})">${iterDate.getDate()}</div>`;
                iterDate.setDate(iterDate.getDate() + 1);
            }
            container.innerHTML = html;
        }

        function changeMiniMonth(dir) {
            miniCalendarDate.setMonth(miniCalendarDate.getMonth() + dir);
            renderMiniCalendar();
        }

        function goToWeekFromMini(y, m, d) {
            currentDate = new Date(y, m, d);
            currentViewIndex = 1; // Semana
            document.getElementById('view-toggle-btn').innerText = `Vista: Semana`;
            renderCalendar();
            miniCalendarDate = new Date(currentDate);
            renderMiniCalendar();
        }

        // --- STREAMING_CHUNK:CRUD Actions Logic ---
        function isSlotOccupied(dateStr, timeStr) {
            return events.some(e => e.dateStr === dateStr && e.timeStr === timeStr && e.id !== editingEventId);
        }

        function handleSlotClick(e, dateStr, timeStr) {
            e.stopPropagation();
            if (isSlotOccupied(dateStr, timeStr)) {
                return showToast('Esta hora ya está ocupada', 'error');
            }
            editingEventId = null;
            document.getElementById('event-modal-title').innerText = 'Nuevo Evento';
            document.getElementById('ev-name').value = '';
            document.getElementById('ev-phone').value = '';
            document.getElementById('ev-obs').value = '';
            document.getElementById('ev-date').value = dateStr;
            document.getElementById('ev-time').value = timeStr;
            document.getElementById('ev-endtime').value = '';
            document.getElementById('autocomplete-list').classList.add('hidden');
            openModal('event-modal');
        }

        function handleMonthDayClick(dateStr) {
            if (holidays.includes(dateStr)) return showToast('Este día es festivo', 'error');
            handleSlotClick(new Event('click'), dateStr, slots[0] || '09:00');
        }

        function saveEvent() {
            const name = document.getElementById('ev-name').value.trim();
            const dateStr = document.getElementById('ev-date').value;
            const timeStr = document.getElementById('ev-time').value;
            const phone = document.getElementById('ev-phone').value.trim();
            const obs = document.getElementById('ev-obs').value.trim();
            const endTimeStr = document.getElementById('ev-endtime').value;

            if (!name) return showToast('El nombre es obligatorio', 'error');
            if (!phone) return showToast('El número de teléfono es obligatorio', 'error');
            if(isSlotOccupied(dateStr, timeStr)) return showToast('Esta franja horaria ya está ocupada.', 'error');

            if (phone) {
                const exist = contacts.find(c => c.name.toLowerCase() === name.toLowerCase());
                if (!exist) contacts.push({ name, phone });
                else exist.phone = phone;
            }

            if (editingEventId) {
                const idx = events.findIndex(e => e.id === editingEventId);
                if (idx > -1) events[idx] = { id: editingEventId, name, phone, obs, dateStr, timeStr, endTimeStr };
            } else {
                events.push({ id: Date.now().toString(), name, phone, obs, dateStr, timeStr, endTimeStr });
            }
            saveState();
            closeModal('event-modal');
            renderCalendar();
            updateContactsList();
            showToast('Evento guardado');
        }

        function openEventCard(e, id) {
            e.stopPropagation();
            const ev = events.find(ex => ex.id === id);
            if (!ev) return;
            actionEventId = id;
            document.getElementById('action-ev-name').innerText = ev.name;
            document.getElementById('action-ev-time').innerText = `${ev.timeStr} ${ev.endTimeStr ? '- ' + ev.endTimeStr : ''}`;
            openModal('event-action-modal');
        }

        function editEventFromAction() {
            closeModal('event-action-modal');
            const ev = events.find(e => e.id === actionEventId);
            if (!ev) return;
            editingEventId = ev.id;
            document.getElementById('event-modal-title').innerText = 'Editar Evento';
            document.getElementById('ev-name').value = ev.name;
            document.getElementById('ev-phone').value = ev.phone || '';
            document.getElementById('ev-obs').value = ev.obs || '';
            document.getElementById('ev-date').value = ev.dateStr;
            document.getElementById('ev-time').value = ev.timeStr;
            document.getElementById('ev-endtime').value = ev.endTimeStr || '';
            openModal('event-modal');
        }

        function deleteEventFromAction() {
            if (!confirm('¿Eliminar evento?')) return;
            events = events.filter(e => e.id !== actionEventId);
            saveState();
            closeModal('event-action-modal');
            renderCalendar();
            showToast('Evento eliminado');
        }

        // --- STREAMING_CHUNK:Day Action Features ---
        function sendWAFromAction() {
            const ev = events.find(e => e.id === actionEventId);
            if (!ev || !ev.phone) return showToast('No hay teléfono registrado', 'error');
            let text = settings.waMessage.replace('{fecha}', ev.dateStr).replace('{hora}', ev.timeStr);
            window.open(`https://wa.me/${ev.phone.replace(/\+/g,'')}?text=${encodeURIComponent(text)}`, '_blank');
        }

        function openDayActionModal(dateStr) {
            selectedDateForAction = dateStr;
            const formatDate = new Date(dateStr).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
            document.getElementById('day-action-title').innerText = `Opciones: ${formatDate}`;
            openModal('day-action-modal');
        }

        function toggleHoliday() {
            const hasEvents = events.some(e => e.dateStr === selectedDateForAction);
            if (hasEvents) return showToast('❌ Hay eventos este día, bórralos primero.', 'error');

            const idx = holidays.indexOf(selectedDateForAction);
            if (idx > -1) holidays.splice(idx, 1);
            else holidays.push(selectedDateForAction);
            
            saveState();
            closeModal('day-action-modal');
            renderCalendar();
            showToast(idx > -1 ? 'Día normal restaurado' : 'Día marcado como festivo');
        }

        function sendBulkWA() {
            const dayEvents = events.filter(e => e.dateStr === selectedDateForAction && e.phone);
            if (dayEvents.length === 0) return showToast('No hay eventos con teléfono para hoy.', 'error');
            
            dayEvents.forEach(ev => {
                let text = settings.waMessage.replace('{fecha}', ev.dateStr).replace('{hora}', ev.timeStr);
                window.open(`https://wa.me/${ev.phone.replace(/\+/g,'')}?text=${encodeURIComponent(text)}`, '_blank');
            });
            closeModal('day-action-modal');
            showToast(`Abriendo ${dayEvents.length} chats... (Permite popups)`);
        }

        function openCustomRangeModal() {
            closeModal('day-action-modal');
            const selectStart = document.getElementById('cr-start');
            const selectEnd = document.getElementById('cr-end');
            selectStart.innerHTML = ''; selectEnd.innerHTML = '';
            
            slots.forEach(time => {
                selectStart.innerHTML += `<option value="${time}">${time}</option>`;
                selectEnd.innerHTML += `<option value="${time}">${time}</option>`;
            });
            
            document.getElementById('cr-name').value = 'Bloqueado';
            openModal('custom-range-modal');
        }

        function saveCustomRange() {
            const name = document.getElementById('cr-name').value.trim() || 'Bloqueado';
            const start = document.getElementById('cr-start').value;
            const end = document.getElementById('cr-end').value;

            const sIdx = slots.indexOf(start);
            const eIdx = slots.indexOf(end);

            if (sIdx >= eIdx) return showToast('La hora de inicio debe ser antes.', 'error');
            for(let i = sIdx; i < eIdx; i++) {
                if (isSlotOccupied(selectedDateForAction, slots[i])) {
                    return showToast(`Choque de horarios a las ${slots[i]}.`, 'error');
                }
            }

            events.push({
                id: Date.now().toString(), name, phone: '', obs: 'Bloqueo',
                dateStr: selectedDateForAction, timeStr: start, endTimeStr: end
            });

            saveState();
            closeModal('custom-range-modal');
            renderCalendar();
            showToast('Franjas bloqueadas correctamente');
        }

        // --- STREAMING_CHUNK:Contacts AutoComplete ---
        function filterContacts(val) {
            const list = document.getElementById('autocomplete-list');
            list.innerHTML = '';
            if (!val) { list.classList.add('hidden'); return; }
            
            const matches = contacts.filter(c => c.name.toLowerCase().includes(val.toLowerCase()));
            if (matches.length === 0) { list.classList.add('hidden'); return; }

            matches.forEach(c => {
                const div = document.createElement('div');
                div.className = "px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer flex justify-between";
                div.innerHTML = `<span>${c.name}</span><span class="text-xs text-gray-500">${c.phone}</span>`;
                div.onclick = () => {
                    document.getElementById('ev-name').value = c.name;
                    document.getElementById('ev-phone').value = c.phone;
                    list.classList.add('hidden');
                };
                list.appendChild(div);
            });
            list.classList.remove('hidden');
        }

        function updateContactsList() {
            const list = document.getElementById('contacts-list');
            const searchInput = document.getElementById('contact-search-input');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

            let filteredContacts = contacts;
            if (searchTerm) {
                filteredContacts = contacts.filter(c => c.name.toLowerCase().includes(searchTerm) || c.phone.includes(searchTerm));
            }

            if(filteredContacts.length === 0) {
                list.innerHTML = '<p class="text-sm text-gray-500 text-center mt-10">No hay contactos guardados.</p>';
                return;
            }
            list.innerHTML = filteredContacts.map((c) => {
                const index = contacts.indexOf(c);
                return `
                <div class="flex justify-between items-center py-2 border-b dark:border-gray-700">
                    <div>
                        <div class="font-medium text-sm">${c.name}</div>
                        <div class="text-xs text-gray-500">${c.phone}</div>
                    </div>
                    <button onclick="deleteContact(${index})" class="text-red-500 hover:bg-red-50 p-1 rounded">🗑️</button>
                </div>
            `}).join('');
        }

        function deleteContact(index) {
            if(!confirm('¿Eliminar contacto?')) return;
            contacts.splice(index, 1);
            saveState();
            updateContactsList();
        }

        // --- STREAMING_CHUNK:Settings & Background Image ---
        function applySettings() {
            if (settings.darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');

            const bgLayer = document.getElementById('bg-layer');
            const app = document.getElementById('app-container');
            
            if (settings.bgUrl) {
                bgLayer.style.backgroundImage = `url('${settings.bgUrl}')`;
                bgLayer.classList.remove('hidden');
                const alpha = settings.opacity / 100;
                app.style.backgroundColor = settings.darkMode ? `rgba(31, 41, 55, ${alpha})` : `rgba(255, 255, 255, ${alpha})`;
            } else {
                bgLayer.classList.add('hidden');
                app.style.backgroundColor = ''; 
            }

            document.getElementById('dark-mode-toggle').checked = settings.darkMode;
            document.getElementById('bg-opacity').value = settings.opacity;
            
            // Set Select values safely
            const setSelectVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };
            setSelectVal('time-start', settings.start);
            setSelectVal('time-end', settings.end);
            setSelectVal('break-start', settings.breakStart);
            setSelectVal('break-end', settings.breakEnd);
            setSelectVal('time-interval', settings.interval);
            
            document.getElementById('wa-message').value = settings.waMessage;
        }

        function updateOpacity() {
            const val = document.getElementById('bg-opacity').value;
            const app = document.getElementById('app-container');
            const isDark = document.documentElement.classList.contains('dark');
            const alpha = val / 100;
            app.style.backgroundColor = isDark ? `rgba(31, 41, 55, ${alpha})` : `rgba(255, 255, 255, ${alpha})`;
        }

        function toggleDarkMode() {
            settings.darkMode = document.getElementById('dark-mode-toggle').checked;
            applySettings();
        }

        function clearBackground() {
            settings.bgUrl = '';
            document.getElementById('bg-image-upload').value = '';
            applySettings();
            showToast('Fondo eliminado');
        }

        function saveSettings() {
            settings.opacity = document.getElementById('bg-opacity').value;
            settings.start = document.getElementById('time-start').value;
            settings.end = document.getElementById('time-end').value;
            settings.breakStart = document.getElementById('break-start').value;
            settings.breakEnd = document.getElementById('break-end').value;
            settings.interval = document.getElementById('time-interval').value;
            settings.waMessage = document.getElementById('wa-message').value;

            const fileInput = document.getElementById('bg-image-upload');
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                // Compresor de imagen invisible para evitar reventar el LocalStorage
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1920; const MAX_HEIGHT = 1080;
                        let width = img.width; let height = img.height;

                        if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        
                        settings.bgUrl = canvas.toDataURL('image/jpeg', 0.6); // comprime
                        finalizeSave();
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                finalizeSave();
            }
        }

        async function finalizeSave() {
            try {
                const docRef = doc(db, 'app_data', 'main');
                await setDoc(docRef, { events, contacts, holidays, settings }, { merge: true });
            } catch(e) { console.error("Error guardando settings", e); }
            
            applySettings();
            generateSlots();
            renderCalendar();
            closeModal('settings-modal');
            showToast('Ajustes guardados en la nube.');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            if(e.target.id !== 'ev-name') {
                document.getElementById('autocomplete-list').classList.add('hidden');
            }
        });

        Object.assign(window, {
            openModal, closeModal, toggleView, changeDate, goToday, changeMiniMonth, goToWeekFromMini,
            handleSlotClick, handleMonthDayClick, saveEvent, openEventCard, editEventFromAction, deleteEventFromAction,
            sendWAFromAction, openDayActionModal, toggleHoliday, sendBulkWA, openCustomRangeModal, saveCustomRange,
            filterContacts, updateContactsList, deleteContact, toggleDarkMode, clearBackground, updateOpacity, saveSettings,
            toggleSidebar
        });
    </script>
</body>
</html>
